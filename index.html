<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurgeHub v1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 0;
            display: block;
            z-index: 1;
        }
        #fsBtn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 2147483647;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 16px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            pointer-events: auto;
        }
        #fsBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        :fullscreen #fsBtn { display: none; }
    </style>
</head>
<body>
    <button id="fsBtn" onclick="document.documentElement.requestFullscreen()">⛶ Fullscreen</button>
    <iframe 
        name="myiFrame"
        src="https://surgehubv1.online"
        scrolling="yes"
        allow="fullscreen; clipboard-write; clipboard-read; autoplay; camera; microphone"
        allowfullscreen>
    </iframe>
</body>
</html>
