<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurgeHub v1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        name="myiFrame"
        src="https://surgehubv1.online"
        scrolling="yes"
        allow="fullscreen; clipboard-write; clipboard-read; autoplay; camera; microphone"
        allowfullscreen>
    </iframe>
</body>
</html>
